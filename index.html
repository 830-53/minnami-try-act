<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title> 1-4 Try&Act 動画サイト</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="index-header">
    <h1><span class="title-badge">1-4</span> Try&amp;Act</h1>
  </header>

  <main>
    <!-- Video Player -->
    <section class="video-section">
      <h2>1-4 Try&Act動画</h2>
      <div id="viewer-content">
        <div class="video-wrapper">
          <video id="main-video" preload="metadata">
            <source src="最大圧縮.mp4" type="video/mp4" />
            お使いのブラウザは動画の再生に対応していません。
          </video>
        </div>
        <div class="video-controls">
          <button class="btn btn-primary" id="btn-play-pause">▶ 再生</button>
          <button class="btn" id="btn-rewind">⏪ 10秒戻る</button>
          <button class="btn" id="btn-forward">10秒進む ⏩</button>
          <div class="progress-bar-container" id="progress-container">
            <div class="progress-bar" id="progress-bar"></div>
          </div>
          <span class="time-display" id="time-display">00:00 / 00:00</span>
        </div>
      </div>
    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
