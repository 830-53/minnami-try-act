<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>管理者ページ – みなみ Try&Act</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>🎬 みなみ Try&amp;Act</h1>
    <a href="index.html">← 動画ページへ戻る</a>
  </header>

  <main>
    <!-- Login -->
    <div class="admin-login" id="admin-login">
      <h2>🔒 管理者ログイン</h2>
      <form id="login-form">
        <input
          type="password"
          id="admin-password"
          placeholder="パスワードを入力"
          required
          autocomplete="off"
        />
        <button type="submit" class="btn btn-primary" style="width:100%">ログイン</button>
        <p id="login-error"></p>
      </form>
    </div>

    <!-- Comments (hidden until logged in) -->
    <section id="admin-comments" style="display:none">
      <div class="admin-header">
        <h2>📋 視聴者の感想一覧</h2>
        <button class="btn" id="btn-logout">ログアウト</button>
      </div>
      <div class="comments-list" id="comments-list"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
